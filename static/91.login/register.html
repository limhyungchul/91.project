<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 & 계정 관리</title>

    <style>
        body {
            font-family: "맑은 고딕", sans-serif;
            background: #111;
            color: white;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 30px auto;
            padding: 35px;
            background: rgba(0,0,0,0.7);
            border: 2px solid #0f0;
            border-radius: 15px;
        }

        h1 {
            text-align: center;
            color: #0ff;
            margin-bottom: 30px;
        }

        h2 {
            color: #0f0;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
            margin-top: 40px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 6px;
            background: #333;
            color: white;
            box-sizing: border-box;
        }

            input[readonly] {
                background: #555;
            }

        button {
            width: 100%;
            padding: 15px;
            margin: 20px 0;
            background: #0066ff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }

            button:hover:not(:disabled) {
                background: #0055cc;
            }

            button:disabled {
                opacity: 0.6;
                cursor: not-allowed;
            }

        .checkbox {
            display: flex;
            align-items: center;
            margin: 20px 0;
        }

            .checkbox input {
                width: auto;
                margin-right: 10px;
                transform: scale(1.5);
            }

        .terms-link {
            color: #0ff;
            text-decoration: underline;
            cursor: pointer;
            margin-left: 10px;
        }

        .terms-box {
            margin: 15px 0;
            padding: 20px;
            background: #002211;
            border: 1px solid #0f0;
            border-radius: 8px;
            display: none;
            max-height: 300px;
            overflow-y: auto;
        }

        .result {
            margin: 20px 0;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            display: none;
        }

        .success {
            background: #003311;
            color: #0f0;
            border: 2px solid #0f0;
        }

        .error {
            background: #330011;
            color: #ff6666;
            border: 2px solid #f00;
        }

        .back-btn {
            background: #777;
            margin-top: 40px;
        }

            .back-btn:hover {
                background: #666;
            }

        @media (max-width: 480px) {
            .container {
                margin: 10px;
                padding: 20px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>회원가입 & 계정 관리 센터</h1>

        <h2>회원가입</h2>

        <input type="text" id="reg-id" placeholder="아이디 (영문+숫자 4~20자)">
        <input type="password" id="reg-pw" placeholder="비밀번호 (8자 이상)">
        <input type="password" id="reg-pw2" placeholder="비밀번호 확인">
        <input type="text" id="reg-name" placeholder="이름 (필수)">
        <input type="email" id="reg-email" placeholder="이메일 (필수)">
        <input type="text" id="reg-phone" placeholder="연락처 (예: 010-1234-5678)" pattern="01[0-9]-[0-9]{4}-[0-9]{4}">
        <input type="text" id="reg-addr" placeholder="주소 (필수)">
        <input type="text" id="reg-company" placeholder="회사명">

        <div class="checkbox">
            <input type="checkbox" id="agree">
            <label for="agree">
                <strong>이용약관 및 개인정보처리방침 동의 (필수)</strong>
                <span class="terms-link" onclick="toggleTerms()">[약관 확인]</span>
            </label>
        </div>

        <div id="terms-box" class="terms-box">
            <p>본 사이트는 개인 프로젝트용입니다. 회원가입 후 관리자 승인 필요.</p>
        </div>

        <button id="reg-btn" onclick="register()">회원가입 완료</button>
        <div id="reg-result" class="result"></div>

        <hr>

        <h2>아이디 찾기 · 비밀번호 재설정</h2>

        <input type="text" id="find-name" placeholder="이름">
        <input type="email" id="find-email" placeholder="이메일">
        <input type="text" id="find-phone" placeholder="연락처">

        <button onclick="findAccount()">아이디/비밀번호 찾기</button>
        <div id="find-result" class="result"></div>

        <div id="reset-pw-section" style="display:none;">
            <input type="text" id="reset-id" readonly>
            <input type="password" id="new-pw" placeholder="새 비밀번호">
            <input type="password" id="new-pw2" placeholder="비밀번호 확인">
            <button onclick="resetPassword()">비밀번호 변경</button>
            <div id="reset-result" class="result"></div>
        </div>

        <button class="back-btn" onclick="location.href='/static/91.login/loginpage.html'">
            로그인 페이지로 돌아가기
        </button>
    </div>

    <script>
        'use strict';

        // 공통 결과 표시 함수
        function showResult(id, message, type) {
            const el = document.getElementById(id);
            el.innerHTML = message;
            el.className = `result ${type}`;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }

        // 약관 토글
        function toggleTerms() {
            const box = document.getElementById('terms-box');
            box.style.display = box.style.display === 'block' ? 'none' : 'block';
        }

        // 회원가입 처리
        async function register() {
            const regBtn = document.getElementById('reg-btn');

            if (!document.getElementById('agree').checked) {
                return showResult('reg-result', '약관에 동의해야 합니다.', 'error');
            }

            // 입력값 가져오기
            const id = document.getElementById('reg-id').value.trim();
            const pw = document.getElementById('reg-pw').value;
            const pw2 = document.getElementById('reg-pw2').value;
            const name = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const phone = document.getElementById('reg-phone').value.trim();
            const addr = document.getElementById('reg-addr').value.trim();
            const company = document.getElementById('reg-company').value.trim();

            // 유효성 검사
            if (pw !== pw2) return showResult('reg-result', '비밀번호가 일치하지 않습니다.', 'error');
            if (pw.length < 8) return showResult('reg-result', '비밀번호는 8자 이상이어야 합니다.', 'error');

            const idRegex = /^[a-zA-Z0-9]{4,20}$/;
            if (!idRegex.test(id)) {
                return showResult('reg-result', '아이디는 영문+숫자 4~20자입니다.', 'error');
            }

            if (!id || !name || !email || !phone || !addr) {
                return showResult('reg-result', '★ 이름, 이메일, 연락처, 주소는 필수입니다.', 'error');
            }

            // 서버 요청
            regBtn.disabled = true;
            regBtn.textContent = '회원가입 중...';

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id, password: pw, name, email, phone, addr, company
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showResult('reg-result', '회원가입 성공! 관리자 승인 대기중입니다.', 'success');
                    setTimeout(() => {
                        if (data.redirect) {
                            location.href = data.redirect;
                        } else {
                            location.href = '/static/91.login/loginpage.html';
                        }
                    }, 2000);
                } else {
                    showResult('reg-result', data.message || '회원가입에 실패했습니다.', 'error');
                }

            } catch (error) {
                console.error('회원가입 오류:', error);
                showResult('reg-result', '서버 연결 오류가 발생했습니다.', 'error');
            } finally {
                regBtn.disabled = false;
                regBtn.textContent = '회원가입 완료';
            }
        }

        // 임시 비활성화 (서버 API 구현 후 활성화)
        async function findAccount() {
            showResult('find-result', '준비중입니다. (서버 API 개발 필요)', 'error');
        }

        async function resetPassword() {
            showResult('reset-result', '준비중입니다. (서버 API 개발 필요)', 'error');
        }

        // Enter키 지원
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                const activeEl = document.activeElement;
                if (activeEl.id === 'reg-pw2') register();
            }
        });
    </script>
</body>
</html>
