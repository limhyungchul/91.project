<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 승인대기중</title>
    <style>
        /* 기존 스타일 그대로 */
        body {
            font-family: "맑은 고딕", sans-serif;
            background: #111;
            color: white;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 45px;
            background: rgba(0,0,0,0.85);
            border: 2px solid #ffaa00;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(255,170,0,0.2);
            animation: pulseGlow 2s ease-in-out infinite alternate;
        }

        @keyframes pulseGlow {
            0% {
                box-shadow: 0 20px 40px rgba(255,170,0,0.2);
            }

            100% {
                box-shadow: 0 20px 60px rgba(255,170,0,0.4);
            }
        }

        h1 {
            color: #ffaa00;
            margin-bottom: 30px;
            font-size: 28px;
            text-shadow: 0 0 20px rgba(255,170,0,0.5);
        }

        .status-icon {
            width: 120px;
            height: 120px;
            margin: 0 auto 25px;
            background: linear-gradient(135deg, #ffaa00, #ff6b00);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            animation: rotate 3s linear infinite;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .waiting-text {
            color: #ffaa00;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 50% {
                opacity: 1;
            }

            51%, 100% {
                opacity: 0.3;
            }
        }

        .description {
            color: #ccc;
            line-height: 1.6;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .warning-box {
            background: rgba(255,100,100,0.1);
            border: 1px solid #ff6666;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0 30px 0;
            text-align: left;
            font-size: 14px;
        }

            .warning-box h3 {
                color: #ff6666;
                margin: 0 0 10px 0;
                font-size: 15px;
            }

            .warning-box p {
                color: #ddd;
                margin: 0;
                line-height: 1.5;
            }

        .back-btn {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            background: linear-gradient(135deg, #ffaa00, #ff6b00);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }

            .back-btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 10px 25px rgba(255,170,0,0.4);
                background: linear-gradient(135deg, #ffbb00, #ff8800);
            }

        @media (max-width: 480px) {
            .container {
                margin: 20px;
                padding: 30px 25px;
            }

            h1 {
                font-size: 24px;
            }

            .warning-box {
                font-size: 13px;
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- ✅ 로그인 체크 (맨 위) -->
    <script>
        window.addEventListener('load', function () {
            const isLoggedIn = sessionStorage.getItem('isLoggedIn') === 'true';

            if (!isLoggedIn) {
                window.location.href = '/static/91.login/loginpage.html';
            }
        });
    </script>

    <div class="container">
        <div class="status-icon">⏳</div>
        <h1>회원가입 승인대기중</h1>
        <div class="waiting-text">관리자 승인 진행중입니다</div>
        <div class="description">
            회원가입 신청이 완료되었습니다.<br>
            관리자의 승인 절차가 진행 중입니다.
        </div>

        <div class="warning-box">
            <h3>⚠️ 주의사항</h3>
            <p><strong>이 사이트는 가입양식 등 문제가 있을 시 승인취소 예정</strong>입니다.</p>
            <p>이 사이트는 관련 업무를 하는 사람을 위한 작업 도구입니다. 모든 자료와 예제는 오류를 방지하기 위해 지속적으로 검토되지만, 완전한 정확성을 보증할 수는 없습니다. 따라서 모든 자료와 예제를 신뢰하기 전에 스스로의 판단에 따라 오류, 버그, 취약점이 없는지 신중하게 테스트하고 검토해야 합니다.</p>
        </div>

        <button class="back-btn" onclick="location.href='/index.html'">
            로그인 페이지로 이동
        </button>
    </div>

    <!-- ✅ 자동 로그아웃 + 사용자 정보 표시 -->
    <script>
        // 현재 로그인 사용자 표시 (선택사항)
        document.addEventListener('DOMContentLoaded', function () {
            const userId = sessionStorage.getItem('userId');
            if (userId) {
                console.log('현재 로그인:', userId);
            }
        });

        // 브라우저 종료 시 자동 로그아웃
        window.addEventListener('beforeunload', function () {
            sessionStorage.clear();
        });
    </script>
</body>
</html>
