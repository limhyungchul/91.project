<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
</head>
<body>
    <div class="login-box">
        <div id="login-section">
            <h2>로그인</h2>
            <div>아이디:</div>
            <input type="text" class="login-form-input" id="login-id" placeholder="아이디 입력" required>
            <div>비밀번호:</div>
            <input type="password" class="login-form-input" id="login-password" placeholder="비밀번호 입력" required>
            <button id="login-btn">로그인</button>
            <div style="margin-top:15px;text-align:center;">
                <!-- ✅ 회원가입 링크 수정 -->
                <a href="./register.html" class="register-link" id="register-btn">
                    회원가입 / 아이디/비밀번호 찾기
                </a>
            </div>
        </div>
    </div>

    <!-- 기존 CSS 그대로 -->

    <script>
        const AUTH_CONFIG = {
            ID: "admin",
            PASSWORD: "1234"
        };

        document.getElementById('login-btn').addEventListener('click', function () {
            const inputId = document.getElementById('login-id').value.trim();
            const inputPw = document.getElementById('login-password').value.trim();

            if (!inputId || !inputPw) {
                alert("아이디와 비밀번호를 모두 입력해주세요.");
                document.getElementById('login-id').focus();
                return;
            }

            if (inputId === AUTH_CONFIG.ID && inputPw === AUTH_CONFIG.PASSWORD) {
                sessionStorage.setItem('isLoggedIn', 'true');
                sessionStorage.setItem('userId', inputId);

                    < !-- ✅ 로그인 성공: 프로젝트 루트 index.html로 이동-- >
                    window.location.href = '/index.html';
            } else {
                alert("아이디 또는 비밀번호가 틀렸습니다.");
                document.getElementById('login-password').value = '';
                document.getElementById('login-password').focus();
            }
        });

        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                document.getElementById('login-btn').click();
            }
        });
    </script>
</body>
</html>
