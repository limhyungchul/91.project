<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
    <style>
        /* 기존 CSS 그대로 유지 */
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(-45deg, #000000, #0a0a0a, #141414, #1e1e1e, #2a2a2a, #363636, #4a4a4a, #6a6a6a, #8a8a8a, #b0b0b0, #dcdcdc, #f0f0f0, #ffffff);
            background-size: 600% 600%;
            animation: gradientBG 25s ease infinite;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .login-box {
            width: 95%;
            max-width: 400px;
            margin: 40px auto;
            padding: 24px;
            background: rgba(0,0,0,0.9);
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }

            .login-box h2 {
                margin-bottom: 24px;
                text-align: center;
                color: #fff;
                font-weight: 300;
            }

        #login-section > div {
            margin-bottom: 4px;
            font-size: 14px;
            color: #ddd;
        }

        .login-form-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 18px;
            border-radius: 6px;
            border: 1px solid #444;
            outline: none;
            font-size: 14px;
            box-sizing: border-box;
            background: #111;
            color: #fff;
            transition: border-color 0.2s;
        }

            .login-form-input:focus {
                border-color: #666;
                box-shadow: 0 0 0 2px rgba(255,255,255,0.1);
            }

            .login-form-input::placeholder {
                color: #888;
            }

        #login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
        }

            #login-btn:hover:not(:disabled) {
                transform: translateY(-1px);
                box-shadow: 0 5px 15px rgba(102,126,234,0.4);
            }

            #login-btn:disabled {
                opacity: 0.6;
                cursor: not-allowed;
            }

        .register-link {
            display: block;
            width: 100%;
            padding: 12px;
            color: #4fc3f7;
            text-decoration: none;
            font-size: 15px;
            text-align: center;
            border: 1px solid #777;
            border-radius: 6px;
            background: transparent;
            transition: all 0.2s ease;
            margin-top: 10px;
            box-sizing: border-box;
        }

            .register-link:hover {
                background: rgba(79,195,247,0.1);
                border-color: #4fc3f7;
                color: #fff;
            }

        .error-msg {
            display: none;
            color: #ff6b6b;
            margin: 10px 0;
            padding: 10px;
            background: rgba(255,107,107,0.1);
            border: 1px solid rgba(255,107,107,0.3);
            border-radius: 6px;
            text-align: center;
        }

        @media (max-width: 480px) {
            .login-box {
                margin: 20px auto;
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div id="login-section">
            <h2>로그인</h2>

            <div class="error-msg" id="error-msg"></div>

            <div>아이디:</div>
            <input type="text" class="login-form-input" id="login-id" placeholder="아이디 입력" required>

            <div>비밀번호:</div>
            <input type="password" class="login-form-input" id="login-password" placeholder="비밀번호 입력" required>

            <button id="login-btn">로그인</button>

            <div style="margin-top:15px;text-align:center;">
                <a href="/static/91.login/register.html" class="register-link">
                    회원가입 / 아이디·비밀번호 찾기
                </a>
            </div>
        </div>
    </div>

    <script>
        (function () {
            'use strict';

            // DOM 요소
            const loginBtn = document.getElementById('login-btn');
            const loginId = document.getElementById('login-id');
            const loginPw = document.getElementById('login-password');
            const errorMsg = document.getElementById('error-msg');

            // 에러 메시지 표시
            function showError(message) {
                errorMsg.textContent = message;
                errorMsg.style.display = 'block';
            }

            // 에러 메시지 숨기기
            function hideError() {
                errorMsg.style.display = 'none';
            }

            // 로그인 처리
            async function handleLogin() {
                const id = loginId.value.trim();
                const pw = loginPw.value.trim();

                if (!id || !pw) {
                    showError('아이디와 비밀번호를 모두 입력해주세요.');
                    return;
                }

                loginBtn.disabled = true;
                loginBtn.textContent = '로그인 중...';
                hideError();

                try {
                    const response = await fetch('/api/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ id, password: pw }),
                    });

                    // 응답이 JSON이 아니라면 에러 처리
                    if (!response.ok) {
                        throw new Error(`HTTP Error: ${response.status}`);
                    }

                    const data = await response.json();

                    // 성공
                    if (data.success) {
                        // 로컬 스토리지에 저장
                        localStorage.setItem('token', data.token || '');
                        localStorage.setItem('userLevel', data.level);
                        localStorage.setItem('userId', data.userid || '');

                        // 서버에서 받은 redirect 경로로 이동, 없으면 index.html
                        const target = data.redirect || '/index.html';
                        if (target) {
                            window.location.href = target;
                        }
                    } else {
                        // 서버에서 보낸 에러 메시지
                        showError(data.message || '로그인에 실패했습니다.');
                    }
                } catch (error) {
                    console.error('로그인 오류:', error);
                    showError('서버 연결 오류가 발생했습니다.');
                } finally {
                    loginBtn.disabled = false;
                    loginBtn.textContent = '로그인';
                }
            }

            // 로그인 버튼 클릭
            loginBtn.addEventListener('click', handleLogin);

            // Enter 키 처리
            document.addEventListener('keydown', function (e) {
                if (e.key === 'Enter' && !loginBtn.disabled) {
                    handleLogin();
                }
            });

            // 입력 필드 포커스 시 에러 메시지 숨기기
            loginId.addEventListener('focus', hideError);
            loginPw.addEventListener('focus', hideError);
        })();
    </script>

</body>
</html>
