<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>관리자 대시보드 (개발용)</title>
    <style>
        body {
            margin: 0;
            font-family: system-ui, sans-serif;
            background: #111;
            color: #eee;
        }

        header {
            padding: 10px 20px;
            background: #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

            header h1 {
                font-size: 18px;
                margin: 0;
            }

            header button {
                margin-left: 8px;
                padding: 4px 10px;
                border: none;
                border-radius: 4px;
                cursor: pointer;
                font-size: 12px;
            }

        .logout {
            background: #ff4757;
            color: #fff;
        }

        .reload {
            background: #2ecc71;
            color: #fff;
        }

        main {
            padding: 20px;
        }

        section {
            background: #181818;
            border-radius: 6px;
            padding: 15px;
            box-shadow: 0 2px 4px rgba(0,0,0,.6);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        th, td {
            border: 1px solid #333;
            padding: 4px 6px;
            text-align: center;
        }

        th {
            background: #222;
        }

        tr:nth-child(even) td {
            background: #161616;
        }

        tr:nth-child(odd) td {
            background: #141414;
        }

        .btn {
            padding: 2px 6px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            margin: 1px;
        }

        .btn-approve {
            background: #27ae60;
            color: #fff;
        }

        .btn-reject {
            background: #c0392b;
            color: #fff;
        }

        .btn-delete {
            background: #e67e22;
            color: #fff;
        }

        .badge {
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 11px;
        }

        .badge-pending {
            background: #f1c40f;
            color: #000;
        }

        .badge-approved {
            background: #2ecc71;
            color: #000;
        }

        .badge-rejected {
            background: #e74c3c;
            color: #fff;
        }

        #status-bar {
            margin-bottom: 10px;
            font-size: 12px;
            color: #aaa;
            padding: 8px;
            background: #1a1a1a;
            border-radius: 4px;
        }

        .loading-text {
            color: #3498db;
        }

        .error-text {
            color: #e74c3c;
        }

        .password-col {
            font-family: monospace;
            letter-spacing: 1px;
        }
    </style>
</head>

<body>
    <header>
        <h1>관리자 대시보드 (개발용)</h1>
        <div>
            <span id="admin-id-label">관리자</span>
            <button class="reload" id="reload-btn">새로고침</button>
            <button class="logout" id="logout-btn">로그아웃</button>
        </div>
    </header>

    <main>
        <div id="status-bar">관리자 권한 확인 중...</div>

        <section>
            <h2>회원 전체 목록</h2>
            <table>
                <thead>
                    <tr>
                        <th>아이디</th>
                        <th>비밀번호</th>
                        <th>이름</th>
                        <th>이메일</th>
                        <th>연락처</th>
                        <!-- 주민번호 컬럼 삭제 -->
                        <th>주소</th>
                        <th>회사명</th>
                        <th>상태</th>
                        <th>레벨</th>
                        <th>가입일</th>
                        <th>작업</th>
                    </tr>
                </thead>
                <tbody id="user-tbody">
                    <tr><td colspan="11">로딩중...</td></tr>
                </tbody>
            </table>
        </section>
    </main>

    <script>
        (function () {
            'use strict';

            // 기본 정보
            const token = localStorage.getItem('token');
            const userId = localStorage.getItem('userId');
            const userLevel = Number(localStorage.getItem('userLevel'));

            const tbody = document.getElementById('user-tbody');
            const statusBar = document.getElementById('status-bar');
            const adminIdLabel = document.getElementById('admin-id-label');

            // L4만 통과 (관리자 전용)
            if (!token || userLevel !== 4) {
                document.body.innerHTML = `
                        <div style="background:#111;color:#eee;height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;font-family:system-ui,sans-serif;">
                            <h1 style="color:#ff4757;font-size:48px;margin:0;">🚫 접근 차단</h1>
                            <p style="color:#aaa;font-size:18px;">관리자(L4)만 접근 가능합니다.</p>
                        </div>
                    `;
                return;
            }

            adminIdLabel.textContent = userId || 'admin';

            function setStatus(msg, isError = false) {
                statusBar.innerHTML = msg;
                statusBar.className = isError ? 'error-text' : 'loading-text';
            }

            // 회원 목록 로드
            async function loadUsers() {
                setStatus('회원 목록 불러오는 중...');
                tbody.innerHTML = '<tr><td colspan="11">로딩중...</td></tr>';

                try {
                    const response = await fetch('/api/admin/users', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const data = await response.json();

                    if (!data.success) throw new Error('회원 목록을 불러올 수 없습니다.');
                    if (!data.data || data.data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="11">등록된 회원이 없습니다.</td></tr>';
                        setStatus('회원 0명');
                        return;
                    }

                    tbody.innerHTML = data.data.map(user => {
                        const statusBadge = {
                            'pending': 'badge-pending',
                            'approved': 'badge-approved',
                            'rejected': 'badge-rejected'
                        }[user.status] || '';

                        const isTopAdmin = user.level === 4;
                        const isMe = user.userid === userId;
                        const actionButtons = (isTopAdmin || isMe)
                            ? ''
                            : `
                                    <button class="btn btn-approve"
                                            onclick="approveUser('${user.userid}', 'approved')"
                                            ${user.status === 'approved' ? 'disabled' : ''}>승인</button>
                                    <button class="btn btn-reject"
                                            onclick="approveUser('${user.userid}', 'rejected')">거절</button>
                                    <button class="btn btn-delete"
                                            onclick="kickUser('${user.userid}')">삭제</button>
                                  `;

                        return `
                                <tr>
                                    <td>${user.userid || '-'}</td>
                                    <td class="password-col">${user.password || '-'}</td>
                                    <td>${user.name || '-'}</td>
                                    <td>${user.email || '-'}</td>
                                    <td>${user.phone || '-'}</td>
                                    <!-- 주민번호 데이터 삭제 -->
                                    <td>${user.address || '-'}</td>
                                    <td>${user.company || '-'}</td>
                                    <td><span class="badge ${statusBadge}">${user.status || 'pending'}</span></td>
                                    <td>L${user.level || 0}</td>
                                    <td>${user.created_at ? new Date(user.created_at).toLocaleString('ko-KR') : '-'}</td>
                                    <td>${actionButtons}</td>
                                </tr>
                            `;
                    }).join('');

                    setStatus(`회원 ${data.data.length}명`);
                } catch (error) {
                    console.error('회원 목록 오류:', error);
                    tbody.innerHTML = '<tr><td colspan="11">서버 오류: ' + error.message + '</td></tr>';
                    setStatus('오류 발생', true);
                }
            }

            // 승인/거절
            window.approveUser = async function (userid, status) {
                if (!confirm(`${userid}을 ${status === 'approved' ? '승인' : '거절'}하시겠습니까?`)) return;
                try {
                    const response = await fetch('/api/admin/users', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ userid, status })
                    });
                    const data = await response.json();
                    if (data.success) {
                        alert('처리 완료');
                        loadUsers();
                    } else {
                        alert('처리 실패');
                    }
                } catch (error) {
                    alert('서버 오류');
                }
            };

            // 삭제
            window.kickUser = async function (userid) {
                if (!confirm(`${userid}을 삭제하시겠습니까?`)) return;
                try {
                    const response = await fetch('/api/admin/users', {
                        method: 'DELETE',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ userid })
                    });
                    const data = await response.json();
                    if (data.success) {
                        alert('삭제 완료');
                        loadUsers();
                    } else {
                        alert('삭제 실패');
                    }
                } catch (error) {
                    alert('서버 오류');
                }
            };

            // 버튼 이벤트
            document.getElementById('reload-btn').onclick = loadUsers;
            document.getElementById('logout-btn').onclick = function () {
                if (confirm('로그아웃 하시겠습니까?')) {
                    localStorage.clear();
                    location.href = '/static/91.login/loginpage.html';
                }
            };

            // 개발용 안내
            if (location.hostname !== 'localhost' && location.hostname !== '127.0.0.1') {
                console.warn('⚠️ 개발용 페이지입니다. 실제 서비스에서 노출하지 마세요.');
            }

            // 초기 로드
            loadUsers();
        })();
    </script>
</body>
</html>
