<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 - 회원 관리 (3단계 등급)</title>
    <style>
        /* 기존 스타일 그대로 유지 */
        body {
            font-family: "맑은 고딕";
            background: #000;
            color: #0f0;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: auto;
            background: rgba(0, 255, 0, 0.05);
            padding: 30px;
            border-radius: 15px;
            border: 2px solid #0f0;
        }

        h1 {
            text-align: center;
            color: #0ff;
            text-shadow: 0 0 15px #0ff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: #001122;
        }

        th,
        td {
            padding: 10px;
            text-align: center;
            border: 1px solid #0f0;
            font-size: 13px;
            word-break: break-all;
        }

        th {
            background: #003311;
            color: #0ff;
        }

        tr:hover {
            background: #002211;
        }

        .level1 {
            color: #aaa;
        }

        .level2 {
            color: #ff0;
            font-weight: bold;
        }

        .level3 {
            color: #0ff;
            font-weight: bold;
            background: #003300;
        }

        .password-col {
            background: #110000 !important;
            color: #ff6600 !important;
            font-family: monospace;
            font-size: 11px;
            max-width: 200px;
            word-break: break-all;
        }

        .btn {
            padding: 6px 12px;
            margin: 0 2px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .kick {
            background: #c00;
            color: white;
        }

        .level-btn {
            background: #0066cc;
            color: white;
        }

        .back {
            display: block;
            width: 200px;
            margin: 30px auto;
            padding: 15px;
            background: #333;
            text-align: center;
            border-radius: 10px;
            color: white;
            text-decoration: none;
        }

        /* IP 관리 섹션 스타일 */
        .ip-section {
            background: rgba(255, 165, 0, 0.1);
            border: 2px solid #ffaa00;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
        }

        .ip-input {
            padding: 8px;
            margin: 5px;
            border: 1px solid #0f0;
            background: #001100;
            color: #0f0;
            border-radius: 4px;
        }

        .ip-btn {
            background: #ffaa00;
            color: #000;
            padding: 8px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }

        #ip-list {
            background: #001100;
            border: 1px solid #0f0;
            padding: 10px;
            max-height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🔐 관리자 대시보드 - 3단계 등급 관리 👑</h1>
        <p style="text-align:center; color:#ff0;">현재 로그인: <strong id="current-user">admin</strong> (Level 3 최고관리자)</p>

        <!-- IP 화이트리스트 관리 섹션 (먼저 로딩) -->
        <div class="ip-section">
            <h3 style="color: #ffaa00; margin-top: 0;">🌐 IP 화이트리스트 관리 (총 <span id="ip-count">0</span>개)</h3>
            <div>
                <input type="text" id="new-ip" class="ip-input" placeholder="새 IP 추가 (예: 203.0.113.50)">
                <button class="ip-btn" onclick="addIP()">IP 추가</button>
                <input type="text" id="remove-ip" class="ip-input" placeholder="삭제할 IP">
                <button class="ip-btn" onclick="removeIP()">IP 삭제</button>
                <button class="ip-btn" onclick="loadIPs()">목록 새로고침</button>
            </div>
            <div id="ip-list">IP 목록 로딩 중...</div>
        </div>
        <!-- 회원 등급 안내 박스 -->
<div class="ip-section" style="border-color:#0ff; background: rgba(0,255,255,0.05); margin-top:10px;">
    <h3 style="color:#0ff; margin-top:0;">📌 회원 등급 안내</h3>
    <ul style="list-style: none; padding-left: 0; color:#0f0; font-size:14px;">
        <li><strong>L1</strong> : 일반 회원</li>
        <li><strong>L2</strong> : 본인 확인 회원</li>
        <li><strong>L3</strong> : 회사/가족/직장 인증 회원</li>
    </ul>
</div>


        <div id="loading" style="text-align:center; padding:50px; font-size:20px;">
            모든 회원 정보 로딩 중...
        </div>

        <table id="user-table" style="display:none;">
            <thead>
                <tr>
                    <th>번호</th>
                    <th>아이디</th>
                    <th>🔑 비밀번호</th>
                    <th>이름</th>
                    <th>이메일</th>
                    <th>연락처</th>
                    <th>주민번호</th>
                    <th>회사</th>
                    <th>주소</th>
                    <th>가입일</th>
                    <th>등급</th>
                    <th>관리</th>
                </tr>
            </thead>
            <tbody id="user-list"></tbody>
        </table>

        <a href="/index.html" class="back">🏠 메인으로 돌아가기</a>
    </div>

    <script>
        const token = localStorage.getItem('token');


        // ✅ IP 관리 함수들 (독립 실행)
        async function api(url, options = {}) {
            const res = await fetch(url, {
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`,
                    ...options.headers
                },
                ...options
            });
            return res.json();
        }

        async function loadIPs() {
            try {
                const data = await api('/api/admin/allowed-ips');
                document.getElementById('ip-count').textContent = data.total || 0;
                document.getElementById('ip-list').textContent = data.ips ? data.ips.join('\n') : '로딩 실패';
            } catch(e) {
                document.getElementById('ip-list').textContent = '오류: ' + e.message;
            }
        }

        async function addIP() {
            const ip = document.getElementById('new-ip').value.trim();
            if (!ip) return alert('IP를 입력하세요');
            try {
                const data = await api('/api/admin/add-ip', {
                    method: 'POST',
                    body: JSON.stringify({ ip })
                });
                alert(data.message);
                document.getElementById('new-ip').value = '';
                loadIPs();
            } catch(e) {
                alert('IP 추가 실패: ' + e.message);
            }
        }

        async function removeIP() {
            const ip = document.getElementById('remove-ip').value.trim();
            if (!ip) return alert('삭제할 IP를 입력하세요');
            if (confirm(`"${ip}"를 화이트리스트에서 삭제하시겠습니까?`)) {
                try {
                    const data = await api('/api/admin/remove-ip', {
                        method: 'POST',
                        body: JSON.stringify({ ip })
                    });
                    alert(data.message);
                    document.getElementById('remove-ip').value = '';
                    loadIPs();
                } catch(e) {
                    alert('IP 삭제 실패: ' + e.message);
                }
            }
        }

        // ✅ 페이지 로드 시 IP 목록 먼저 로딩 (회원관리와 독립)
        loadIPs();

        // ✅ 회원 관리 (수정된 버전 - IP에 영향 없음)
// ✅ 회원 관리 (완전 수정된 버전 - IP에 전혀 영향 없음)
fetch('/api/admin/users', {
    headers: { 'Authorization': `Bearer ${token}` }
})
.then(res => res.json())
.then(data => {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('user-table').style.display = 'table';

    const tbody = document.getElementById('user-list');
    data.data.forEach((user, index) => {
        const tr = document.createElement('tr');
        const levelClass = user.level == 1 ? 'level1' : user.level == 2 ? 'level2' : 'level3';
        tr.innerHTML = `
            <td>${index + 1}</td>
            <td><strong>${user.userid}</strong></td>
            <td class="password-col">
                <div style="color:#0f0;font-weight:bold;font-size:14px;">${user.plain_password || '***'}</div>
                <div style="font-size:10px;color:#ff6600;">${user.password?.slice(0,20)}...</div>
            </td>
            <td>${user.name || '-'}</td>
            <td>${user.email || '-'}</td>
            <td>${user.phone || '-'}</td>
            <td>${user.jumin || '-'}</td>
            <td>${user.company || '-'}</td>
            <td style="max-width:150px;">${user.addr || '-'}</td>
            <td>${new Date(user.created_at).toLocaleString('ko-KR')}</td>
            <td><span class="${levelClass}">Level ${user.level}</span></td>
            <td>
                <button class="btn level-btn" onclick="updateLevel('${user.userid}', 1)">L1</button>
                <button class="btn level-btn" onclick="updateLevel('${user.userid}', 2)">L2</button>
                <button class="btn level-btn" onclick="updateLevel('${user.userid}', 3)">L3</button>
                <button class="btn kick" onclick="kickUser('${user.userid}')">강퇴</button>
            </td>
        `;
        tbody.appendChild(tr);
    });
})
.catch(err => {
    console.error('회원 목록 로딩 실패:', err);
    // 회원관리 실패해도 IP 관리는 계속 동작
    document.getElementById('loading').style.display = 'none';
    document.getElementById('user-table').style.display = 'none';
});


        // 기존 함수들 (그대로)
        async function updateLevel(userid, level) {
            if (confirm(`"${userid}"을 Level ${level}로 변경하시겠습니까?`)) {
                try {
                    const res = await fetch('/api/admin/update-level', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ userid, level })
                    });
                    const data = await res.json();
                    alert(data.message || '등급 변경 완료!');
                    location.reload();
                } catch {
                    alert('등급 변경 실패');
                }
            }
        }

        async function kickUser(userid) {
            if (confirm(`"${userid}" 회원을 **실제로 삭제**하시겠습니까?`)) {
                try {
                    const res = await fetch('/api/admin/kick-user', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ userid })
                    });
                    const data = await res.json();

                    if (data.success) {
                        alert(`✅ ${userid} 강퇴되었습니다!`);
                        location.reload();
                    } else {
                        alert(`❌ ${data.message}`);
                    }
                } catch {
                    alert('강퇴 실패 - 서버 오류');
                }
            }
        }
    </script>
</body>
</html>
