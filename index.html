<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>메인 페이지</title>

    <style>
        body {
            margin: 0;
            font-family: Arial,sans-serif;
        }

        header {
            background: #222;
            color: #fff;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        button {
            padding: 6px 12px;
            cursor: pointer;
        }

        .container {
            padding: 40px;
        }

        .links {
            margin: 20px 40px;
        }

            .links a {
                color: black;
                margin-right: 15px;
                text-decoration: none;
            }

                .links a:hover {
                    text-decoration: underline;
                }
    </style>
</head>

<body>


    <header>
        <div>✅ 관리자 시스템 메인</div>
        <div>
            <span id="user-info"></span>
            <button onclick="logout()">로그아웃</button>
        </div>
    </header>

    <div class="container">
        <h2>로그인 성공 🎉</h2>
        <p>이 페이지가 보이면 JWT 인증 및 이동이 정상 작동한 상태입니다.</p>
    </div>

    <div class="links">
        <a href="/admin.html">🔐 관리자 페이지</a>
        <a href="/91.login/register.html">📝 회원가입</a>
    </div>

    <script>

        // ✅ 로그인 체크
        const token = localStorage.getItem('token');
        const userId = localStorage.getItem('userId');
        const level = localStorage.getItem('userLevel');

        //if (!token) {
          //  alert('로그인이 필요합니다.');
            //location.href = '/91.login/loginpage.html';
       // }

        // 사용자 표시
      if (userId) {
      document.getElementById('user-info').textContent =
            userId + ' 님 (Lv.' + (level || 0) + ')';
   }

        // 로그아웃
        function logout() {
            localStorage.clear();
            alert('로그아웃 되었습니다.');
            location.href = '/91.login/loginpage.html';
        }

    </script>

</body>
</html>
